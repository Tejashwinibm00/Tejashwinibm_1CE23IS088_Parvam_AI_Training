{% extends 'base.html' %}
{% block title %}New Product - Admin{% endblock %}
{% block content %}
<h2>New product</h2>
<form method="post">
  <div class="mb-3"><label>Name</label><input class="form-control" name="name"></div>
  <div class="mb-3"><label>Price</label><input class="form-control" name="price" type="number" step="0.01"></div>
  <div class="mb-3"><label>Category</label>
    <select name="category_id" class="form-control">
      {% for c in categories %}
      <option value="{{ c.id }}">{{ c.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3"><label>Description</label><textarea class="form-control" name="description"></textarea></div>
  <button class="btn btn-primary">Save</button>
</form>
{% endblock %}
