{% extends 'base.html' %}
{% block title %}Sign In | MiniStore{% endblock %}
{% block content %}
<div class="row justify-content-center pt-5">
    <div class="col-md-4">
        <div class="text-center mb-4">
            <h1 class="fw-bold">MiniStore</h1>
        </div>
        <div class="bg-white p-4 rounded shadow-sm border">
            <h2 class="fw-normal mb-4">Sign In</h2>
            <form action="{{ url_for('login') }}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-bold">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-warning w-100 py-2 mb-3 shadow-sm">Sign In</button>
            </form>
            <p class="small text-muted">By continuing, you agree to MiniStore's Conditions of Use and Privacy Notice.</p>
        </div>
        <div class="text-center mt-4">
            <p class="text-muted small mb-2">New to MiniStore?</p>
            <a href="{{ url_for('register') }}" class="btn btn-light w-100 border shadow-sm">Create your MiniStore account</a>
        </div>
    </div>
</div>
{% endblock %}
