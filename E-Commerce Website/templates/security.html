{% extends 'base.html' %}
{% block title %}Login & Security | MiniStore{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="bg-white p-5 rounded shadow-sm border">
            <h2 class="fw-bold mb-4">Login & Security</h2>
            <div class="list-group list-group-flush">
                <div class="list-group-item d-flex justify-content-between align-items-center py-3">
                    <div>
                        <div class="fw-bold">Name</div>
                        <div>{{ current_user.email.split('@')[0] }}</div>
                    </div>
                    <button class="btn btn-light border btn-sm px-4 rounded-pill">Edit</button>
                </div>
                <div class="list-group-item d-flex justify-content-between align-items-center py-3">
                    <div>
                        <div class="fw-bold">Email</div>
                        <div>{{ current_user.email }}</div>
                    </div>
                    <button class="btn btn-light border btn-sm px-4 rounded-pill">Edit</button>
                </div>
                <div class="list-group-item d-flex justify-content-between align-items-center py-3">
                    <div>
                        <div class="fw-bold">Password</div>
                        <div>********</div>
                    </div>
                    <button class="btn btn-light border btn-sm px-4 rounded-pill">Edit</button>
                </div>
            </div>
            <div class="mt-4">
                <a href="{{ url_for('profile') }}" class="btn btn-warning rounded-pill px-4">Done</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
