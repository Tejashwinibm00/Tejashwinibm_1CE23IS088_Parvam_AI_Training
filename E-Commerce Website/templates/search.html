{% extends 'base.html' %}
{% block title %}Search - MiniStore{% endblock %}
{% block content %}
<h3>Search results for "{{ q }}"</h3>
{% if results %}
  <div class="row">
    {% for p in results %}
    <div class="col-md-3">
      <div class="card mb-3"><div class="card-body">
        <h5 class="card-title">{{ p.name }}</h5>
        <p class="card-text">${{ '%.2f'|format(p.price) }}</p>
        <a href="{{ url_for('product_page', pid=p.id) }}" class="btn btn-primary">View</a>
      </div></div>
    </div>
    {% endfor %}
  </div>
{% else %}
  <p>No products found.</p>
{% endif %}
{% endblock %}
