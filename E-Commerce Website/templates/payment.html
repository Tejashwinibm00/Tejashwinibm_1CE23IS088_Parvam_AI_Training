{% extends 'base.html' %}
{% block title %}Payment | MiniStore{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="bg-white p-4 rounded shadow-sm">
            <h2 class="fw-bold mb-4">Select Payment Method</h2>
            <form action="{{ url_for('payment') }}" method="post">
                <div class="form-check mb-3 p-3 border rounded">
                    <input class="form-check-input ms-0 me-3" type="radio" name="payment" id="card" checked>
                    <label class="form-check-label d-flex align-items-center" for="card">
                        <i class="bi bi-credit-card fs-3 me-3"></i>
                        <div>
                            <div class="fw-bold">Credit or Debit Card</div>
                            <small class="text-muted">MiniStore accepts all major cards</small>
                        </div>
                    </label>
                </div>
                <div class="form-check mb-4 p-3 border rounded">
                    <input class="form-check-input ms-0 me-3" type="radio" name="payment" id="paypal">
                    <label class="form-check-label d-flex align-items-center" for="paypal">
                        <i class="bi bi-paypal fs-3 me-3"></i>
                        <div>
                            <div class="fw-bold">PayPal</div>
                            <small class="text-muted">Pay securely with your PayPal account</small>
                        </div>
                    </label>
                </div>
                <button type="submit" class="btn btn-warning w-100 rounded-pill py-2 fw-bold">Continue to Review</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
