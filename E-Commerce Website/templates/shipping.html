{% extends 'base.html' %}
{% block title %}Shipping | MiniStore{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="bg-white p-4 rounded shadow-sm">
            <h2 class="fw-bold mb-4">Enter Shipping Address</h2>
            <form action="{{ url_for('shipping') }}" method="post">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control rounded-pill" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Address Line 1</label>
                    <input type="text" name="address" class="form-control rounded-pill" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">City</label>
                    <input type="text" class="form-control rounded-pill" required>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Postal Code</label>
                        <input type="text" class="form-control rounded-pill" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Country</label>
                        <input type="text" class="form-control rounded-pill" value="United States" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-warning w-100 rounded-pill py-2 mt-3 fw-bold">Continue to Payment</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
